<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Matrix Hub - Gestión Especializada</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; overflow-x: hidden; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        input[type="number"]::-webkit-inner-spin-button { display: none; }
        
        .section-card { background: white; border-radius: 24px; padding: 2rem; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05); border: 1px solid #f1f5f9; }
        
        .tab-btn { padding: 1rem 1.5rem; font-weight: 800; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; color: #94a3b8; border-bottom: 3px solid transparent; transition: all 0.2s; white-space: nowrap; }
        .tab-btn.active { color: #2563eb; border-bottom-color: #2563eb; background-color: #eff6ff; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .status-badge { font-size: 9px; font-weight: 900; text-transform: uppercase; padding: 2px 8px; border-radius: 6px; }
        .status-pending { background: #fee2e2; color: #ef4444; }
        .status-done { background: #dcfce7; color: #16a34a; }

        #login-overlay {
            position: fixed;
            inset: 0;
            background: #0f172a;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease;
        }
        #main-app { display: none; }

        .loading-spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-left-color: #3b82f6;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Estilos específicos para los Arts */
        .art-card {
            min-width: 220px;
            height: 380px;
            background: white;
            border-radius: 1.5rem;
            padding: 0.75rem;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            border: 1px solid #f1f5f9;
            transition: all 0.3s ease;
            cursor: pointer;
            flex-shrink: 0;
        }
        .art-card:hover { transform: translateY(-4px); box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }
        .art-preview {
            height: 100%;
            background: #f8fafc;
            border-radius: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
    </style>
</head>
<body class="min-h-screen pb-20">

    <div id="login-overlay">
        <div class="w-full max-w-sm p-8 text-center">
            <div class="bg-blue-600 w-16 h-16 rounded-2xl flex items-center justify-center text-white mx-auto mb-6 shadow-xl shadow-blue-900/20">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            </div>
            <h2 class="text-white text-2xl font-black uppercase tracking-tighter mb-2">Acceso Restringido</h2>
            <p id="auth-status-text" class="text-slate-500 text-xs font-bold uppercase tracking-widest mb-8">Cloud Management System</p>
            
            <div class="space-y-4">
                <input type="password" id="auth-pass" placeholder="Ingresa tu clave de acceso" 
                    class="w-full bg-slate-800 border-none rounded-2xl px-6 py-4 text-white text-center font-bold outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                <button id="login-btn" onclick="checkAuth()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-2xl text-xs uppercase tracking-widest transition-all flex items-center justify-center gap-2">
                    <span>Entrar al Sistema</span>
                </button>
                <p id="auth-error" class="text-red-500 text-[10px] font-black uppercase tracking-widest hidden mt-4">Clave incorrecta o error de configuración</p>
            </div>
        </div>
    </div>

    <div id="main-app">
        <nav class="bg-white border-b border-gray-100 sticky top-0 z-50 shadow-sm">
            <div class="px-8 py-4 flex justify-between items-center">
                <div class="flex items-center gap-4">
                    <div class="bg-blue-600 p-2 rounded-xl text-white">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>
                    </div>
                    <div>
                        <h1 class="text-xl font-black tracking-tighter">AM <span class="text-blue-600">MANAGEMENT</span></h1>
                        <p id="connection-label" class="text-[9px] text-gray-400 font-black uppercase tracking-widest">Sincronización Local</p>
                    </div>
                </div>

                <div class="flex items-center gap-4">
                    <select id="branch-selector" onchange="switchBranch(this.value)" class="bg-slate-100 border-none rounded-xl px-4 py-2 text-xs font-black text-slate-700 outline-none cursor-pointer hover:bg-slate-200 transition-colors">
                        <option value="mty">MONTERREY</option>
                        <option value="cdmx">CDMX</option>
                        <option value="slw">SALTILLO</option>
                    </select>
                    <button onclick="saveAll()" id="save-btn" class="bg-blue-600 text-white px-5 py-2 rounded-xl text-xs font-black uppercase shadow-lg shadow-blue-100 hover:bg-blue-700 transition-all flex items-center gap-2">
                        <span>Guardar</span>
                    </button>
                    <button onclick="logout()" class="text-slate-400 hover:text-red-500 ml-2 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                    </button>
                </div>
            </div>

            <div class="flex px-8 border-t border-gray-50 overflow-x-auto no-scrollbar bg-white">
                <button onclick="switchTab('tab-meta')" id="btn-tab-meta" class="tab-btn active">I. Embudo Meta</button>
                <button onclick="switchTab('tab-eventos')" id="btn-tab-eventos" class="tab-btn">II. Gestión de Eventos</button>
                <button onclick="switchTab('tab-express')" id="btn-tab-express" class="tab-btn">III. Express</button>
                <button onclick="switchTab('tab-insumos')" id="btn-tab-insumos" class="tab-btn">IV. Insumos</button>
                <button onclick="switchTab('tab-drive')" id="btn-tab-drive" class="tab-btn">V. Multimedia Drive</button>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto py-8 px-6">
            <!-- TAB META -->
            <div id="tab-meta" class="tab-content active space-y-8">
                <section class="section-card border-l-8 border-l-blue-600">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="font-black text-slate-800 text-xl uppercase tracking-tighter">Status Meta: <span id="label-sucursal" class="text-blue-600">...</span></h2>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                        <div class="bg-blue-50 p-6 rounded-2xl border border-blue-100">
                            <label class="text-[9px] font-black text-blue-400 uppercase block mb-1">Leads Logrados</label>
                            <input type="number" id="leads-actual" oninput="calculateMeta()" class="bg-transparent text-4xl font-black w-full outline-none text-blue-600" value="0">
                        </div>
                        <div class="p-6">
                            <label class="text-[9px] font-black text-gray-400 uppercase block mb-1">Meta Mensual</label>
                            <div class="flex items-baseline gap-1">
                                <span class="text-3xl font-black text-gray-800" id="leads-count">0</span>
                                <span class="text-gray-400 font-bold" id="leads-goal">/ 0</span>
                            </div>
                            <div class="w-full bg-gray-100 h-1.5 mt-3 rounded-full overflow-hidden">
                                <div id="leads-bar" class="bg-blue-600 h-full transition-all duration-500" style="width: 0%"></div>
                            </div>
                        </div>
                        <div class="p-6">
                            <label class="text-[9px] font-black text-gray-400 uppercase block mb-1">Inversión Meta</label>
                            <div class="flex items-center text-3xl font-black text-green-600">$<input type="number" id="budget-actual" oninput="calculateMeta()" class="bg-transparent w-full outline-none" value="0"></div>
                        </div>
                        <div class="p-6">
                            <label class="text-[9px] font-black text-gray-400 uppercase block mb-1">CPL Actual</label>
                            <h2 class="text-3xl font-black text-gray-800" id="cpl-display">$0.00</h2>
                        </div>
                    </div>
                </section>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-8" id="meta-materials"></div>
            </div>

            <!-- TAB EVENTOS -->
            <div id="tab-eventos" class="tab-content space-y-8">
                <div class="flex justify-between items-end mb-4">
                    <h2 class="font-black text-2xl uppercase tracking-tighter">Planificación de Eventos</h2>
                    <button onclick="addEvent()" class="bg-blue-600 text-white px-6 py-2 rounded-xl text-[10px] font-black uppercase">+ Crear Nuevo Evento</button>
                </div>
                <div id="events-container" class="space-y-6"></div>
            </div>

            <!-- TAB EXPRESS -->
            <div id="tab-express" class="tab-content space-y-8">
                <div class="section-card bg-slate-900 border-none text-white">
                    <div class="flex justify-between items-center mb-10">
                        <div>
                            <h2 class="text-2xl font-black uppercase tracking-tighter italic text-blue-500">Log Express Sync</h2>
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Total del mes: <span id="express-count" class="text-white">0</span> tareas</p>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 gap-4 mb-10" id="express-list"></div>
                    <div class="bg-slate-800 p-6 rounded-[32px] grid grid-cols-1 md:grid-cols-3 gap-4">
                        <input type="text" id="ex-nom" placeholder="Nomenclatura" class="bg-slate-700 border-none rounded-xl px-4 py-3 text-sm text-white outline-none focus:ring-2 focus:ring-blue-500 font-bold">
                        <input type="text" id="ex-link" placeholder="URL Asana" class="bg-slate-700 border-none rounded-xl px-4 py-3 text-sm text-white outline-none focus:ring-2 focus:ring-blue-500">
                        <button onclick="addExpress()" class="bg-blue-600 hover:bg-blue-700 rounded-xl font-black text-white text-xs uppercase transition-all">Registrar</button>
                    </div>
                </div>
            </div>

            <!-- TAB INSUMOS -->
            <div id="tab-insumos" class="tab-content space-y-8">
                <section class="section-card">
                    <div class="flex justify-between items-center mb-8">
                        <h2 class="font-black text-2xl uppercase tracking-tighter">Renovaciones</h2>
                        <span id="insumos-branch" class="text-[10px] font-black text-blue-600 uppercase">...</span>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="insumos-grid"></div>
                    <button onclick="addInsumo()" class="mt-8 w-full border-2 border-dashed border-gray-100 py-6 rounded-3xl text-xs font-black text-gray-400 hover:border-blue-400 hover:text-blue-600 transition-all uppercase">+ Agregar Material</button>
                </section>
            </div>

            <!-- TAB DRIVE (NUEVA) -->
            <div id="tab-drive" class="tab-content space-y-12">
                <div class="flex items-center gap-2 mb-2">
                    <div class="w-8 h-[3px] bg-blue-600"></div>
                    <h3 class="text-gray-400 text-[10px] font-black italic tracking-widest uppercase">
                        Visualizador Multimedia Drive Arts
                    </h3>
                </div>
                <div id="drive-container" class="space-y-16">
                    <!-- Se inyectan AWA, PRO y RET aquí -->
                </div>
            </div>
        </main>
    </div>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-8 py-4 rounded-2xl shadow-2xl opacity-0 pointer-events-none transition-all font-black text-[10px] uppercase tracking-widest z-[100]"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const MASTER_PASSWORD = "Cremalab#2026"; 
        const cloudConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;
        const cloudAppId = typeof __app_id !== 'undefined' ? __app_id : null;

        let db = null;
        let auth = null;
        let isCloudMode = false;

        if (cloudConfig) {
            try {
                const app = initializeApp(cloudConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                isCloudMode = true;
                document.getElementById('connection-label').innerText = 'Cloud Sync Activo';
            } catch (e) {
                console.warn("Falla en Cloud Config.");
            }
        }

        let currentBranch = 'mty';
        let data = JSON.parse(localStorage.getItem('am_local_data')) || {
            mty: { label: 'Monterrey', leads: 0, goal: 1350, budget: 0, metaMaterials: { awa: [], pro: [], ret: [] }, events: [], express: [], insumos: [], drive: { awa: 12, pro: 6, ret: 8 } },
            cdmx: { label: 'CDMX', leads: 0, goal: 800, budget: 0, metaMaterials: {awa:[], pro:[], ret:[]}, events: [], express: [], insumos: [], drive: { awa: 5, pro: 3, ret: 4 } },
            slw: { label: 'Saltillo', leads: 0, goal: 350, budget: 0, metaMaterials: {awa:[], pro:[], ret:[]}, events: [], express: [], insumos: [], drive: { awa: 4, pro: 2, ret: 2 } }
        };

        window.checkAuth = async () => {
            const pass = document.getElementById('auth-pass').value;
            if (pass === MASTER_PASSWORD) {
                if (isCloudMode) {
                    try { await signInAnonymously(auth); } catch (e) { openAppLocally(); }
                } else { openAppLocally(); }
            } else {
                const error = document.getElementById('auth-error');
                error.classList.remove('hidden');
                setTimeout(() => error.classList.add('hidden'), 2000);
            }
        };

        function openAppLocally() {
            document.getElementById('login-overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
                renderAll();
            }, 500);
        }

        if (auth) {
            onAuthStateChanged(auth, (user) => {
                if (user) { openAppLocally(); initCloudSync(); }
            });
        }

        async function initCloudSync() {
            const docRef = doc(db, 'artifacts', cloudAppId, 'public', 'data', 'master_data');
            onSnapshot(docRef, (docSnap) => {
                if (docSnap.exists()) { data = docSnap.data(); renderAll(); }
            });
        }

        window.saveAll = async () => {
            updateDataFromInputs();
            localStorage.setItem('am_local_data', JSON.stringify(data));
            if (isCloudMode && auth.currentUser) {
                const saveBtn = document.getElementById('save-btn');
                saveBtn.innerHTML = '<div class="loading-spinner"></div>';
                try {
                    const docRef = doc(db, 'artifacts', cloudAppId, 'public', 'data', 'master_data');
                    await setDoc(docRef, data);
                    showToast("Sincronizado");
                } catch (e) { showToast("Error"); } 
                finally { saveBtn.innerText = 'Guardar'; }
            } else { showToast("Guardado Local"); }
        };

        function updateDataFromInputs() {
            const b = data[currentBranch];
            b.leads = parseInt(document.getElementById('leads-actual').value) || 0;
            b.budget = parseFloat(document.getElementById('budget-actual').value) || 0;
        }

        window.logout = () => { if(auth) auth.signOut(); location.reload(); };
        window.switchTab = (id) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('btn-'+id).classList.add('active');
        };
        window.switchBranch = (id) => { updateDataFromInputs(); currentBranch = id; renderAll(); };

        function renderAll() {
            const b = data[currentBranch];
            document.getElementById('label-sucursal').innerText = b.label;
            document.getElementById('insumos-branch').innerText = b.label;
            document.getElementById('leads-actual').value = b.leads;
            document.getElementById('budget-actual').value = b.budget;
            renderMetaMaterials();
            renderEvents();
            renderExpress();
            renderInsumos();
            renderDrive();
            calculateMeta();
        }

        function renderDrive() {
            const b = data[currentBranch];
            const stages = [
                { id: 'awa', title: 'AWA', count: b.drive?.awa || 0, icon: 'play' },
                { id: 'pro', title: 'PRO', count: b.drive?.pro || 0, icon: 'image' },
                { id: 'ret', title: 'RET', count: b.drive?.ret || 0, icon: 'play' }
            ];

            document.getElementById('drive-container').innerHTML = stages.map((stage, idx) => `
                <div class="w-full">
                    <div class="flex justify-between items-center mb-6 border-b border-gray-100 pb-3">
                        <div class="flex items-center gap-3">
                            <div class="bg-gray-900 text-white text-[9px] font-black px-2 py-1 rounded">ETAPA ${idx+1}</div>
                            <h4 class="text-xl font-black text-gray-800 uppercase tracking-tighter">${stage.title} <span class="text-blue-600">DRIVE</span></h4>
                            <span class="text-gray-400 text-[10px] font-bold uppercase tracking-widest ml-4">${stage.count} ARCHIVOS</span>
                        </div>
                    </div>
                    <div class="relative">
                        <div class="flex gap-4 overflow-x-auto pb-4 no-scrollbar snap-x scroll-smooth">
                            ${Array.from({ length: stage.count }).map((_, i) => `
                                <div class="art-card snap-start">
                                    <div class="art-preview">
                                        <div class="opacity-20">
                                            ${stage.icon === 'play' ? 
                                                '<svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polygon points="10 8 16 12 10 16 10 8"></polygon></svg>' : 
                                                '<svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>'
                                            }
                                        </div>
                                        <div class="absolute bottom-3 left-3 right-3 bg-white/90 backdrop-blur-md px-2 py-1.5 rounded-lg border border-white/50 shadow-sm">
                                            <span class="text-[8px] font-black text-gray-800 uppercase truncate block">
                                                ${stage.id}_file_${i+1}.ext
                                            </span>
                                        </div>
                                    </div>
                                </div>
                            `).join('')}
                            <div class="min-w-[120px] h-[380px] border-2 border-dashed border-gray-100 rounded-[1.5rem] flex flex-col items-center justify-center text-gray-300 hover:text-blue-400 hover:border-blue-200 transition-all cursor-pointer">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                                <span class="text-[8px] font-black uppercase mt-2">Sync</span>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // --- RESTO DE FUNCIONES DE RENDER (IGUAL QUE ANTES) ---
        function renderMetaMaterials() {
            const b = data[currentBranch];
            document.getElementById('meta-materials').innerHTML = ['awa', 'pro', 'ret'].map(p => `
                <div class="section-card">
                    <h4 class="text-[10px] font-black uppercase text-gray-400 mb-4">${p}</h4>
                    <div class="space-y-2">
                        ${(b.metaMaterials[p] || []).map((m, i) => `
                            <div class="flex items-center gap-2 p-2 bg-slate-50 rounded-lg text-[11px] font-bold">
                                <input type="checkbox" ${m.d ? 'checked' : ''} onchange="toggleMetaMat('${p}',${i})" class="w-4 h-4">
                                <input type="text" value="${m.t}" onchange="editMetaMat('${p}',${i},this.value)" class="bg-transparent flex-1 outline-none ${m.d ? 'line-through text-gray-300' : ''}">
                            </div>`).join('')}
                    </div>
                    <button onclick="addMetaMat('${p}')" class="mt-4 text-[9px] font-black text-blue-500 uppercase">+ Add</button>
                </div>`).join('');
        }

        function renderEvents() {
            document.getElementById('events-container').innerHTML = (data[currentBranch].events || []).map((ev, i) => `
                <div class="section-card">
                    <input type="text" value="${ev.name}" onchange="data['${currentBranch}'].events[${i}].name=this.value" class="text-xl font-black uppercase outline-none block w-full mb-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-2">
                            <h5 class="text-[8px] font-black text-blue-500 uppercase mb-2">Digital</h5>
                            ${(ev.digital || []).map((d, di) => `<div class="flex items-center gap-2 text-xs font-bold text-slate-600"><input type="checkbox" ${d.d ? 'checked' : ''} onchange="toggleEvTask(${i},'digital',${di})"> ${d.t}</div>`).join('')}
                            <button onclick="addEvTask(${i},'digital')" class="text-[9px] font-bold text-blue-500 uppercase">+ Add</button>
                        </div>
                        <div class="space-y-2">
                             <h5 class="text-[8px] font-black text-green-500 uppercase mb-2">Logística</h5>
                            ${(ev.logistics || []).map((l, li) => `<div class="flex items-center gap-2 text-xs font-bold text-slate-600"><input type="checkbox" ${l.d ? 'checked' : ''} onchange="toggleEvTask(${i},'logistics',${li})"> ${l.t}</div>`).join('')}
                            <button onclick="addEvTask(${i},'logistics')" class="text-[9px] font-bold text-blue-500 uppercase">+ Add</button>
                        </div>
                    </div>
                </div>`).join('');
        }

        function renderExpress() {
            document.getElementById('express-count').innerText = (data[currentBranch].express || []).length;
            document.getElementById('express-list').innerHTML = (data[currentBranch].express || []).map((ex, i) => `
                <div class="bg-slate-800 p-4 rounded-xl flex justify-between items-center">
                    <span class="text-sm font-bold text-blue-100 tracking-tight">${ex.name}</span>
                    <button onclick="removeExpress(${i})" class="text-slate-500 hover:text-red-400 transition-colors">✕</button>
                </div>`).join('');
        }

        function renderInsumos() {
            document.getElementById('insumos-grid').innerHTML = (data[currentBranch].insumos || []).map((ins, i) => `
                <div class="p-6 rounded-3xl border border-gray-100 bg-white">
                    <input type="text" value="${ins.t}" onchange="data['${currentBranch}'].insumos[${i}].t=this.value" class="font-black text-sm block w-full mb-4 outline-none">
                    <div class="flex justify-between items-center">
                        <span class="status-badge ${ins.status === 'OK' ? 'status-done' : 'status-pending'}">${ins.status}</span>
                        <button onclick="removeInsumo(${i})" class="text-gray-300">✕</button>
                    </div>
                </div>`).join('');
        }

        window.calculateMeta = () => {
            const b = data[currentBranch];
            const current = parseInt(document.getElementById('leads-actual').value) || 0;
            const budget = parseFloat(document.getElementById('budget-actual').value) || 0;
            document.getElementById('leads-count').innerText = current.toLocaleString();
            document.getElementById('leads-goal').innerText = `/ ${b.goal.toLocaleString()}`;
            document.getElementById('leads-bar').style.width = `${Math.min((current/b.goal)*100, 100)}%`;
            document.getElementById('cpl-display').innerText = `$${(current > 0 ? budget/current : 0).toFixed(2)}`;
        };

        window.addMetaMat = (p) => { data[currentBranch].metaMaterials[p].push({t:'Nuevo', d:false}); renderMetaMaterials(); };
        window.toggleMetaMat = (p,i) => { data[currentBranch].metaMaterials[p][i].d = !data[currentBranch].metaMaterials[p][i].d; renderMetaMaterials(); };
        window.editMetaMat = (p,i,v) => { data[currentBranch].metaMaterials[p][i].t = v; };
        window.addEvent = () => { data[currentBranch].events.push({name:'NUEVO EVENTO', digital:[], logistics:[]}); renderEvents(); };
        window.addEvTask = (i, type) => { if(type==='digital') data[currentBranch].events[i].digital.push({t:'Nueva Tarea', d:false}); else data[currentBranch].events[i].logistics.push({t:'Nuevo Costo', c:0, d:false}); renderEvents(); };
        window.toggleEvTask = (i, type, idx) => { data[currentBranch].events[i][type][idx].d = !data[currentBranch].events[i][type][idx].d; renderEvents(); };
        window.addExpress = () => { const name = document.getElementById('ex-nom').value; if(name){ data[currentBranch].express.push({name}); renderExpress(); document.getElementById('ex-nom').value=''; } };
        window.removeExpress = (i) => { data[currentBranch].express.splice(i,1); renderExpress(); };
        window.addInsumo = () => { data[currentBranch].insumos.push({t:'Material de Renovación', status:'OK'}); renderInsumos(); };
        window.removeInsumo = (i) => { data[currentBranch].insumos.splice(i,1); renderInsumos(); };

        function showToast(m) {
            const t = document.getElementById('toast');
            t.innerText = m; t.classList.replace('opacity-0', 'opacity-100');
            setTimeout(() => t.classList.replace('opacity-100', 'opacity-0'), 2000);
        }

        document.getElementById('auth-pass').addEventListener('keypress', (e) => { if(e.key==='Enter') checkAuth(); });
    </script>
</body>
</html>
