<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AccountMatrix Hub</title>
    
    <!-- Cargador de Tailwind CSS -->
    <script src="[https://cdn.tailwindcss.com](https://cdn.tailwindcss.com)"></script>
    
    <!-- Configuración para que Tailwind funcione con React -->
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'ui-sans-serif', 'system-ui'],
            },
          },
        },
      }
    </script>

    <style type="text/css">
      /* Estilo base para evitar que se vea blanco mientras carga */
      body { 
        margin: 0; 
        background-color: #f8fafc; 
        min-height: 100vh;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    
    <!-- IMPORTANTE: El script debe ir al final del body -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
