<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Matrix Hub - Dashboard Profesional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f7ff; color: #1e293b; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        input[type="number"]::-webkit-inner-spin-button { display: none; }
        
        /* Estilos idénticos a la imagen */
        .main-card { background: white; border-radius: 35px; padding: 2.5rem; box-shadow: 0 10px 30px -5px rgba(0,0,0,0.03); }
        .leads-box { background-color: #f0f6ff; border-radius: 20px; padding: 1.5rem; text-align: center; min-width: 180px; }
        
        .progress-container { height: 8px; background: #f1f5f9; border-radius: 10px; overflow: hidden; margin-top: 10px; }
        .progress-bar { height: 100%; background: #2563eb; transition: width 0.5s ease; }

        .checklist-card { background: white; border-radius: 30px; padding: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.02); height: 100%; }
        
        /* Carrusel Multimedia debajo */
        .funnel-carousel { display: flex; overflow-x: auto; gap: 1.5rem; padding: 1rem 0 2rem 0; scroll-snap-type: x mandatory; }
        .multimedia-card { min-width: 320px; scroll-snap-align: start; flex-shrink: 0; background: white; border-radius: 30px; padding: 1.5rem; border: 1px solid #f1f5f9; }
        .media-preview { width: 100%; aspect-ratio: 9/16; background: #000; border-radius: 20px; margin-top: 15px; overflow: hidden; position: relative; }
        .media-preview iframe, .media-preview img { width: 100%; height: 100%; object-fit: cover; border: none; }

        #login-overlay { position: fixed; inset: 0; background: #0f172a; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        #main-app { display: none; }
    </style>
</head>
<body class="min-h-screen pb-20">

    <!-- Login -->
    <div id="login-overlay">
        <div class="w-full max-w-sm p-8 text-center">
            <div class="bg-blue-600 w-16 h-16 rounded-2xl flex items-center justify-center text-white mx-auto mb-6">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            </div>
            <h2 class="text-white text-2xl font-black uppercase mb-8">Account Matrix Hub</h2>
            <input type="password" id="auth-pass" placeholder="Password" class="w-full bg-slate-800 border-none rounded-2xl px-6 py-4 text-white text-center font-bold mb-4 outline-none focus:ring-2 focus:ring-blue-500">
            <button onclick="checkAuth()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-2xl text-xs uppercase tracking-widest transition-all">Entrar</button>
        </div>
    </div>

    <!-- App Principal -->
    <div id="main-app">
        <nav class="px-8 py-6 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center text-white font-black">AM</div>
                <h1 class="text-xl font-black tracking-tighter uppercase">Management Hub</h1>
            </div>
            <div class="flex items-center gap-4">
                <select id="branch-selector" onchange="switchBranch(this.value)" class="bg-white border-none rounded-xl px-4 py-2 text-xs font-black text-slate-700 shadow-sm">
                    <option value="mty">MONTERREY</option>
                    <option value="cdmx">CDMX</option>
                    <option value="slw">SALTILLO</option>
                </select>
                <button onclick="saveAll()" id="save-btn" class="bg-blue-600 text-white px-6 py-2 rounded-xl text-xs font-black uppercase shadow-lg shadow-blue-200">Sincronizar</button>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto px-6">
            
            <!-- SECCIÓN SUPERIOR (IGUAL A LA IMAGEN) -->
            <section class="main-card mb-8">
                <h2 class="text-blue-600 font-black text-2xl uppercase mb-8">Status Meta: <span id="sucursal-title" class="text-blue-600">...</span></h2>
                
                <div class="flex flex-wrap md:flex-nowrap items-center gap-12">
                    <!-- Leads Logrados -->
                    <div class="leads-box">
                        <label class="text-[10px] font-black text-blue-400 uppercase block mb-1">Leads Logrados</label>
                        <input type="number" id="leads-actual" oninput="updateUI()" class="bg-transparent text-6xl font-black text-blue-600 w-full text-center outline-none" value="337">
                    </div>

                    <!-- Meta Mensual -->
                    <div class="flex-1">
                        <div class="flex justify-between items-end mb-1">
                            <div>
                                <label class="text-[10px] font-black text-slate-400 uppercase block">Meta Mensual</label>
                                <span class="text-3xl font-black text-slate-800"><span id="leads-count">337</span> <span class="text-slate-300">/ <span id="leads-goal">1,350</span></span></span>
                            </div>
                        </div>
                        <div class="progress-container">
                            <div id="progress-bar" class="progress-bar" style="width: 25%;"></div>
                        </div>
                    </div>

                    <!-- Inversión Meta -->
                    <div>
                        <label class="text-[10px] font-black text-slate-400 uppercase block mb-1">Inversión Meta</label>
                        <div class="flex items-center text-3xl font-black text-green-500">
                            $ <input type="number" id="budget-actual" oninput="updateUI()" class="bg-transparent w-32 outline-none ml-1" value="135000">
                        </div>
                    </div>

                    <!-- CPL Actual -->
                    <div class="text-right">
                        <label class="text-[10px] font-black text-slate-400 uppercase block mb-1 text-right">CPL Actual</label>
                        <h2 class="text-3xl font-black text-slate-800" id="cpl-display">$400.59</h2>
                    </div>
                </div>
            </section>

            <!-- SECCIÓN CHECKLISTS (IGUAL A LA IMAGEN) -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-12" id="checklists-container">
                <!-- Se inyectan dinámicamente -->
            </div>

            <!-- SECCIÓN VISUALIZACIÓN MULTIMEDIA (NUEVA ABAJO) -->
            <div class="mb-4 flex items-center gap-2">
                <div class="h-[2px] w-8 bg-blue-600"></div>
                <h3 class="font-black text-xs uppercase tracking-widest text-slate-400 italic">Visualizador Multimedia Drive Arts</h3>
            </div>
            
            <div class="funnel-carousel no-scrollbar" id="multimedia-carousel">
                <!-- Se inyectan los artes verticales -->
            </div>

        </main>
    </div>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-8 py-4 rounded-2xl shadow-2xl opacity-0 pointer-events-none transition-all font-black text-[10px] uppercase z-[100]"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const cloudConfig = {
            apiKey: "AIzaSyCi3nxC2c8Sp4JAs9ylU4uxVagVXToP8HM",
            authDomain: "accountmatrixhub.firebaseapp.com",
            projectId: "accountmatrixhub",
            storageBucket: "accountmatrixhub.firebasestorage.app",
            messagingSenderId: "912278749399",
            appId: "1:912278749399:web:f6c4f8f575b01243d2b092"
        };
        const cloudAppId = "accountmatrixhub";

        let db, auth, isCloud = false;
        try {
            const app = initializeApp(cloudConfig);
            auth = getAuth(app);
            db = getFirestore(app);
            isCloud = true;
        } catch(e) {}

        const MASTER_PASSWORD = "Cremalab#2026";
        let currentBranch = 'mty';
        let data = JSON.parse(localStorage.getItem('am_data_v3')) || {
            mty: { label: 'MONTERREY', leads: 337, budget: 135000, goal: 1350, checklist: { awa: [], pro: [], ret: [] }, arts: { awa: [], pro: [], ret: [] } },
            cdmx: { label: 'CDMX', leads: 0, budget: 0, goal: 800, checklist: { awa: [], pro: [], ret: [] }, arts: { awa: [], pro: [], ret: [] } },
            slw: { label: 'SALTILLO', leads: 0, budget: 0, goal: 350, checklist: { awa: [], pro: [], ret: [] }, arts: { awa: [], pro: [], ret: [] } }
        };

        window.checkAuth = async () => {
            if (document.getElementById('auth-pass').value === MASTER_PASSWORD) {
                if(isCloud) await signInAnonymously(auth); else openApp();
            }
        };

        function openApp() {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            renderAll();
        }

        if(auth) onAuthStateChanged(auth, (user) => { if(user) { openApp(); initSync(); }});

        function initSync() {
            onSnapshot(doc(db, 'artifacts', cloudAppId, 'public', 'data', 'master_v3'), (s) => {
                if(s.exists()) { data = s.data(); renderAll(); }
            });
        }

        window.saveAll = async () => {
            updateDataFromInputs();
            localStorage.setItem('am_data_v3', JSON.stringify(data));
            if(isCloud && auth.currentUser) {
                await setDoc(doc(db, 'artifacts', cloudAppId, 'public', 'data', 'master_v3'), data);
                showToast("Sincronizado con la Nube");
            }
        };

        function updateDataFromInputs() {
            data[currentBranch].leads = parseInt(document.getElementById('leads-actual').value) || 0;
            data[currentBranch].budget = parseFloat(document.getElementById('budget-actual').value) || 0;
        }

        window.switchBranch = (id) => { updateDataFromInputs(); currentBranch = id; renderAll(); };

        function renderAll() {
            const b = data[currentBranch];
            document.getElementById('sucursal-title').innerText = b.label;
            document.getElementById('leads-actual').value = b.leads;
            document.getElementById('budget-actual').value = b.budget;
            document.getElementById('leads-goal').innerText = b.goal.toLocaleString();
            updateUI();
            renderChecklists();
            renderMultimedia();
        }

        window.updateUI = () => {
            const leads = parseInt(document.getElementById('leads-actual').value) || 0;
            const budget = parseFloat(document.getElementById('budget-actual').value) || 0;
            const goal = data[currentBranch].goal;
            
            document.getElementById('leads-count').innerText = leads.toLocaleString();
            document.getElementById('cpl-display').innerText = `$${(leads > 0 ? budget/leads : 0).toFixed(2)}`;
            document.getElementById('progress-bar').style.width = `${Math.min((leads/goal)*100, 100)}%`;
        };

        function renderChecklists() {
            const b = data[currentBranch];
            const container = document.getElementById('checklists-container');
            container.innerHTML = ['awa', 'pro', 'ret'].map(type => `
                <div class="checklist-card">
                    <h4 class="text-[11px] font-black uppercase text-slate-400 mb-6 tracking-widest">${type}</h4>
                    <div class="space-y-4">
                        ${(b.checklist[type] || []).map((item, i) => `
                            <div class="flex items-center gap-3 group">
                                <input type="checkbox" ${item.done ? 'checked' : ''} onchange="toggleCheck('${type}', ${i})" class="w-5 h-5 rounded-md border-slate-200 text-blue-600 focus:ring-0">
                                <input type="text" value="${item.text}" onchange="editCheck('${type}', ${i}, this.value)" class="flex-1 bg-transparent text-sm font-bold outline-none ${item.done ? 'line-through text-slate-300' : 'text-slate-700'}">
                                <button onclick="removeCheck('${type}', ${i})" class="text-slate-200 hover:text-red-400 opacity-0 group-hover:opacity-100 transition-opacity">✕</button>
                            </div>
                        `).join('')}
                        <button onclick="addCheck('${type}')" class="text-blue-600 text-[10px] font-black uppercase mt-4">+ ADD</button>
                    </div>
                </div>
            `).join('');
        }

        function renderMultimedia() {
            const b = data[currentBranch];
            const container = document.getElementById('multimedia-carousel');
            container.innerHTML = ['awa', 'pro', 'ret'].map(type => `
                <div class="multimedia-card">
                    <div class="flex justify-between items-center mb-4">
                        <h4 class="font-black text-slate-800 uppercase text-lg">${type} Arts</h4>
                        <button onclick="addArt('${type}')" class="bg-blue-50 text-blue-600 p-2 rounded-xl hover:bg-blue-600 hover:text-white transition-all">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                        </button>
                    </div>
                    <div class="space-y-8">
                        ${(b.arts[type] || []).map((art, i) => `
                            <div class="group">
                                <div class="flex justify-between items-center mb-2">
                                    <input type="text" value="${art.title}" onchange="editArt('${type}', ${i}, 'title', this.value)" class="text-xs font-black uppercase text-slate-600 outline-none w-full bg-transparent">
                                    <button onclick="removeArt('${type}', ${i})" class="text-red-300 hover:text-red-600 opacity-0 group-hover:opacity-100 transition-opacity">✕</button>
                                </div>
                                <input type="text" value="${art.url}" onchange="editArt('${type}', ${i}, 'url', this.value)" class="text-[9px] text-slate-400 bg-slate-50 w-full p-2 rounded-lg mb-2 outline-none" placeholder="Drive URL">
                                <div class="media-preview">
                                    ${renderMedia(art.url)}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        function renderMedia(url) {
            if(!url) return `<div class="text-slate-600 text-[10px] font-black flex flex-col items-center gap-2"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>SIN ARTE</div>`;
            if(url.includes('drive.google.com')) {
                const id = url.split('/d/')[1]?.split('/')[0] || url.split('id=')[1];
                return `<iframe src="https://drive.google.com/file/d/${id}/preview" allow="autoplay" class="absolute inset-0"></iframe>`;
            }
            return `<img src="${url}" class="absolute inset-0 w-full h-full object-cover">`;
        }

        window.addCheck = (t) => { data[currentBranch].checklist[t].push({text:'Nuevo item', done:false}); renderChecklists(); };
        window.toggleCheck = (t, i) => { data[currentBranch].checklist[t][i].done = !data[currentBranch].checklist[t][i].done; renderChecklists(); };
        window.editCheck = (t, i, v) => { data[currentBranch].checklist[t][i].text = v; };
        window.removeCheck = (t, i) => { data[currentBranch].checklist[t].splice(i, 1); renderChecklists(); };

        window.addArt = (t) => { data[currentBranch].arts[t].push({title:'Nuevo Arte', url:''}); renderMultimedia(); };
        window.editArt = (t, i, f, v) => { data[currentBranch].arts[t][i][f] = v; if(f==='url') renderMultimedia(); };
        window.removeArt = (t, i) => { data[currentBranch].arts[t].splice(i, 1); renderMultimedia(); };

        function showToast(m) {
            const t = document.getElementById('toast'); t.innerText = m; t.classList.replace('opacity-0', 'opacity-100');
            setTimeout(() => t.classList.replace('opacity-100', 'opacity-0'), 2000);
        }
    </script>
</body>
</html>
